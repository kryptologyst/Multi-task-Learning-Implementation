name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov
    
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ tests/
    
    - name: Format check with black
      run: |
        pip install black
        black --check src/ tests/
    
    - name: Type check with mypy
      run: |
        pip install mypy
        mypy src/ --ignore-missing-imports
    
    - name: Test with pytest
      run: |
        pytest tests/ --cov=src/mtl --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  smoke-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: 3.10
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Run smoke test
      run: |
        python -c "
        import sys
        sys.path.append('src')
        from mtl.models import ResNetMTL, BaselineModel
        from mtl.data import CIFAR10AttributesDataset
        from mtl.losses import WeightedSumLoss
        from mtl.metrics import MultiTaskMetrics
        from mtl.utils import get_device, set_seed
        
        print('✅ All imports successful')
        
        # Test model creation
        model = BaselineModel()
        print('✅ Model creation successful')
        
        # Test device detection
        device = get_device('cpu')
        print(f'✅ Device detection successful: {device}')
        
        # Test seed setting
        set_seed(42)
        print('✅ Seed setting successful')
        
        print('🎉 Smoke test passed!')
        "

  build-demo:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: 3.10
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install streamlit
    
    - name: Test demo imports
      run: |
        python -c "
        import streamlit as st
        import sys
        sys.path.append('src')
        from mtl.models import ResNetMTL
        print('✅ Demo dependencies check passed')
        "
    
    - name: Build documentation
      run: |
        echo "Documentation build would go here"
        echo "Demo is ready for deployment"
